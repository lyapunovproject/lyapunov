<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>LYAPUNOV — descent</title>
<meta name="theme-color" content="#ffffff" />
<!-- casting this URL launches the mini app -->
<meta name="fc:miniapp" content='{"version":"1","imageUrl":"https://lyapunov.xyz/icons/fc-card.png","button":{"title":"Enter the descent","action":{"type":"launch_frame","name":"LYAPUNOV","url":"https://lyapunov.xyz/mini","splashImageUrl":"https://lyapunov.xyz/icons/icon-512.png","splashBackgroundColor":"#ffffff"}}}' />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
<style>
  :root{ --ink:#0a0a0a; --paper:#fff; --orange:#ff5a00; --mute:#8a8a8a; --line:#e7e7e7; --m:18px }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:var(--paper);color:var(--ink);
    font-family:'Archivo',system-ui,sans-serif;-webkit-font-smoothing:antialiased;overflow:hidden}
  #app{height:100%;display:flex;flex-direction:column;padding:var(--m)}
  header{display:flex;justify-content:space-between;align-items:baseline}
  .wm{font-weight:700;letter-spacing:.18em;font-size:15px}
  .wm b{color:var(--orange)}
  .tag{font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.2em;color:var(--mute)}
  .stage-wrap{position:relative;flex:1;margin:6px 0}
  canvas{position:absolute;inset:0;width:100%;height:100%;display:block}
  .read{position:absolute;left:0;right:0;bottom:2px;text-align:center;pointer-events:none}
  .stage{font-weight:600;font-size:clamp(20px,7vw,30px);letter-spacing:-.01em;line-height:1}
  .v{font-family:'Space Mono',monospace;font-size:12px;letter-spacing:.12em;color:var(--mute);margin-top:.5em}
  .bar{height:1px;background:var(--line);margin:14px 12% 0;position:relative}
  .bar span{position:absolute;left:0;top:0;height:1px;width:0;background:var(--orange);transition:width 1.2s ease}
  .sub{font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.22em;color:#bdbdbd;margin-top:10px;text-transform:uppercase}
  .actions{display:flex;flex-direction:column;gap:9px}
  button{font-family:'Space Mono',monospace;border:0;cursor:pointer;width:100%}
  .buy{background:var(--ink);color:var(--paper);font-size:13px;letter-spacing:.2em;padding:16px;transition:background .2s}
  .buy:active{background:var(--orange)}
  .ghost{background:transparent;color:var(--mute);font-size:11px;letter-spacing:.22em;padding:6px}
  .ghost b{color:var(--ink)}
</style>
</head>
<body>
  <div id="app">
    <header><span class="wm">LYAPUNOV<b>.</b></span><span class="tag">$LPNV · SOLANA</span></header>
    <div class="stage-wrap">
      <canvas id="c"></canvas>
      <div class="read">
        <div class="stage" id="stage">—</div>
        <div class="v" id="v">V = —</div>
        <div class="bar"><span id="fill"></span></div>
        <div class="sub" id="sub">a one-way descent</div>
      </div>
    </div>
    <div class="actions">
      <button class="buy" id="buy">ACQUIRE&nbsp;&nbsp;$LPNV&nbsp;&nbsp;→</button>
      <button class="ghost" id="share">cast the <b>descent</b></button>
    </div>
  </div>

<script type="module">
  let BUY = 'https://pump.fun/coin/pvysiEDLr6E9SsS4gETrDCikMdekAPBtYxK7AnZpump'; // overridden by /api/state.buyUrl

  /* ---- live descent state ---- */
  let p = 0; // 0..1 overall progress toward the fixed point
  let stageName = '—';
  async function poll(){
    try{
      const d = await (await fetch('/api/state', { cache:'no-store' })).json();
      const th = Number(d.thresholds[d.thresholds.length - 1]);
      p = Math.max(0, Math.min(1, Number(d.fed) / th));
      stageName = d.stageName;
      if (d.buyUrl) BUY = d.buyUrl;
      document.getElementById('stage').textContent = d.stageName;
      document.getElementById('v').textContent = 'V = ' + (Number(d.V) / 1e18).toFixed(5);
      document.getElementById('fill').style.width = (p * 100).toFixed(1) + '%';
      document.getElementById('sub').textContent = 'STATE ' + d.stage + ' / 6 · DV/DT < 0';
    }catch(e){}
  }
  poll(); setInterval(poll, 15000);

  /* ---- the swarm: a cloud contracting onto one orange fixed point ---- */
  const cv = document.getElementById('c'), ctx = cv.getContext('2d');
  let W = 0, H = 0, DPR = 1;
  function resize(){
    DPR = Math.min(2, window.devicePixelRatio || 1);
    const r = cv.getBoundingClientRect();
    W = cv.width = Math.max(1, r.width * DPR);
    H = cv.height = Math.max(1, r.height * DPR);
  }
  const N = 460, pts = [];
  for (let i = 0; i < N; i++) pts.push({ a: Math.random()*Math.PI*2, r: Math.pow(Math.random(), 0.7), s: 0.25 + Math.random()*0.9, ph: Math.random()*99 });
  let ph = 0;
  function frame(t){
    if (!W) resize();
    ph += (p - ph) * 0.03;
    ctx.clearRect(0,0,W,H);
    const cx = W/2, cy = H/2, R = Math.min(W,H) * 0.46;
    const tight = 1 - 0.8*ph;           // radius collapses toward the fixed point as V falls
    const chaos = 0.45*(1-ph) + 0.06;   // motion calms as the system settles
    const s = Math.max(1, 1.15*DPR);
    ctx.fillStyle = '#0a0a0a';
    for (const q of pts){
      const ang = q.a + t*0.00003*q.s + Math.sin(t*0.0006*q.s + q.ph)*0.5*chaos;
      const rad = R*q.r*tight + Math.sin(t*0.0011*q.s + q.ph) * R * 0.07 * chaos;
      ctx.fillRect(cx + Math.cos(ang)*rad - s/2, cy + Math.sin(ang)*rad - s/2, s, s);
    }
    // the attractor
    const cr = (2.6 + 1.2*ph) * DPR;
    ctx.fillStyle = 'rgba(255,90,0,0.18)';
    ctx.beginPath(); ctx.arc(cx, cy, cr*3.2, 0, 7); ctx.fill();
    ctx.fillStyle = '#ff5a00';
    ctx.beginPath(); ctx.arc(cx, cy, cr, 0, 7); ctx.fill();
    requestAnimationFrame(frame);
  }
  window.addEventListener('resize', resize);
  resize(); requestAnimationFrame(frame);

  /* ---- Farcaster mini-app SDK: actions + dismiss splash ---- */
  let sdk = null;
  try { ({ sdk } = await import('https://esm.sh/@farcaster/miniapp-sdk')); } catch(e){}
  const openBuy = async () => {
    if (sdk){ try { await sdk.actions.openUrl(BUY); return; } catch(e){} }
    window.open(BUY, '_blank');
  };
  const share = async () => {
    const text = stageName + '. A one-way descent to a fixed point. $LPNV on Solana — V is only ever decreasing.';
    if (sdk){ try { await sdk.actions.composeCast({ text, embeds:['https://lyapunov.xyz/mini'] }); return; } catch(e){} }
    window.open('https://warpcast.com/~/compose?text=' + encodeURIComponent(text + ' https://lyapunov.xyz/mini'), '_blank');
  };
  document.getElementById('buy').addEventListener('click', openBuy);
  document.getElementById('share').addEventListener('click', share);

  if (sdk){ try { await sdk.actions.ready(); } catch(e){} }
</script>
</body>
</html>
